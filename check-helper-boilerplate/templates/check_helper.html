<html>
<head>
  <link rel="stylesheet" type="text/css" href="resources/style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
  <script src="resources/script.js"></script>
</head>
<body>
  <h1>Welcome to My Cashier <span id="username"></span></h1>
  <div id="check_details">
    <!-- These buttons should add and remove an item at the end of the list -->
    <button id="add_item">+</button>
    <button id="remove_item">-</button>

    <!-- This form is where the items, their price and all txes information will
         be added -->
    <form method="POST" action="register_check" id="user_input">
      <h4>Items:</h4>
      <div id="items">
        <!-- First set of items alread added, more to come -->
        <div class="item">
          <input type="text" class="item_name" name="item_name"></input>
          <input type="text" class="item_price" name="item_price"></input>
        </div>

      </div>
      <hr>
      <div id="tax_and_service">
        <label for="tax_rate">Tax Rate (%):</label>
        <input type="text" id="tax_rate" name="tax_rate"></input>
        <label for="service_quality">Service Quality:</label>
        <!-- The user selects words, but we will submit values -->
        <select id="service_quality" name="service_rate">
          <option value="0.08">Poor</option>
          <option value="0.15">Acceptable</option>
          <option value="0.18">Good</option>
          <option value="0.20">Exceptional</option>
        </select>
      </div>
      <!-- Compute the results -->
      <input type="submit" id="submit_btn"></input>
    </form>
  </div>
</body>
</html>
